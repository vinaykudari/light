<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200" role="img" aria-label="Synthetic lung cancer clinical note">
  <rect width="900" height="1200" fill="#F8FAFC"/>
  <rect x="80" y="60" width="740" height="1080" rx="24" fill="#FFFFFF" stroke="#D8E2EE"/>
  <rect x="80" y="60" width="740" height="150" rx="24" fill="#0F172A"/>
  <text x="130" y="130" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#FFFFFF">Synthetic Clinical Note</text>
  <text x="130" y="174" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#B7F7D3">De-identified demo document for Light</text>

  <text x="130" y="270" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Patient Context</text>
  <rect x="130" y="294" width="640" height="170" rx="16" fill="#F1F5F9"/>
  <text x="160" y="342" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Adult synthetic patient in San Francisco, CA.</text>
  <text x="160" y="382" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Diagnosis: metastatic non-small cell lung cancer.</text>
  <text x="160" y="422" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Biomarker: EGFR exon 20 insertion.</text>

  <text x="130" y="530" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Prior Therapy</text>
  <rect x="130" y="554" width="640" height="98" rx="16" fill="#ECFDF5"/>
  <text x="160" y="610" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#166534">Platinum-based chemotherapy documented by report.</text>

  <text x="130" y="718" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Trial Discussion Goals</text>
  <rect x="130" y="742" width="640" height="178" rx="16" fill="#EFF6FF"/>
  <text x="160" y="790" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1E3A8A">Find clinical trials worth discussing with clinician.</text>
  <text x="160" y="830" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1E3A8A">Understand biopsy or tissue requirements.</text>
  <text x="160" y="870" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#1E3A8A">Clarify visit frequency and travel reimbursement.</text>

  <text x="130" y="986" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Missing Pre-Screening Details</text>
  <rect x="130" y="1010" width="640" height="96" rx="16" fill="#FEF2F2"/>
  <text x="160" y="1050" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#991B1B">ECOG status, creatinine clearance, brain metastases stability,</text>
  <text x="160" y="1084" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#991B1B">prior therapy dates, genomics report, and tissue availability.</text>
  <text x="130" y="1142" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#64748B">For education and clinician-reviewed trial discussion prep only.</text>
</svg>
