<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1550" viewBox="0 0 1200 1550" role="img" aria-label="Synthetic de-identified clinical note for Light upload demo">
  <rect width="1200" height="1550" fill="#eef3f8"/>
  <rect x="110" y="80" width="980" height="1390" rx="18" fill="#ffffff" stroke="#d7e0ea" stroke-width="3"/>
  <rect x="110" y="80" width="980" height="130" rx="18" fill="#0f172a"/>
  <text x="160" y="145" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Synthetic Clinical Note</text>
  <text x="160" y="184" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#a7f3d0">De-identified sample for Light clinical trial intelligence demo</text>
  <text x="160" y="260" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Patient Context</text>
  <text x="160" y="302" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Age: 34</text>
  <text x="160" y="334" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Location: San Francisco, California</text>
  <text x="160" y="366" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Visit type: Research study discussion prep</text>
  <line x1="160" y1="410" x2="1040" y2="410" stroke="#e2e8f0" stroke-width="3"/>
  <text x="160" y="460" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0f172a">History</text>
  <text x="160" y="502" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Patient reports COVID infection approximately 8 months ago.</text>
  <text x="160" y="534" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Symptoms have persisted for longer than 3 months after infection.</text>
  <text x="160" y="566" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Patient wants to know what clinical trials or research studies may be</text>
  <text x="160" y="598" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">worth discussing with their clinician. No real PHI is included.</text>
  <line x1="160" y1="642" x2="1040" y2="642" stroke="#e2e8f0" stroke-width="3"/>
  <text x="160" y="692" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Reported Symptoms</text>
  <circle cx="176" cy="735" r="5" fill="#2563eb"/>
  <text x="196" y="742" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Brain fog and word-finding difficulty during meetings</text>
  <circle cx="176" cy="775" r="5" fill="#2563eb"/>
  <text x="196" y="782" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Crushing fatigue after small tasks</text>
  <circle cx="176" cy="815" r="5" fill="#2563eb"/>
  <text x="196" y="822" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Delayed post-exertional crash for 1 to 2 days after short walks</text>
  <circle cx="176" cy="855" r="5" fill="#2563eb"/>
  <text x="196" y="862" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Dizziness and fast heart rate when standing</text>
  <circle cx="176" cy="895" r="5" fill="#2563eb"/>
  <text x="196" y="902" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Poor sleep</text>
  <line x1="160" y1="948" x2="1040" y2="948" stroke="#e2e8f0" stroke-width="3"/>
  <text x="160" y="998" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Research Context To Explore</text>
  <text x="160" y="1040" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Long COVID / PASC symptom pattern for clinician-reviewed</text>
  <text x="160" y="1072" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">clinical trial discussion. Possible research themes include cognitive</text>
  <text x="160" y="1104" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">dysfunction, post-exertional malaise, dysautonomia or POTS-like</text>
  <text x="160" y="1136" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">symptoms, fatigue, and sleep disturbance.</text>
  <line x1="160" y1="1180" x2="1040" y2="1180" stroke="#e2e8f0" stroke-width="3"/>
  <text x="160" y="1230" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#0f172a">Missing Pre-screening Information</text>
  <text x="160" y="1272" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">Documented COVID history; hospitalization or ICU status; medication</text>
  <text x="160" y="1304" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">stability; other diagnoses that could explain symptoms; feasibility of</text>
  <text x="160" y="1336" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">multiple visits; willingness for blood collection; recent vaccination or</text>
  <text x="160" y="1368" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#334155">medication changes if clinical trial criteria require review.</text>
  <rect x="160" y="1408" width="880" height="34" rx="8" fill="#ecfdf5"/>
  <text x="180" y="1431" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#047857">For education and clinician-reviewed trial discussion prep only. Not medical advice.</text>
</svg>
